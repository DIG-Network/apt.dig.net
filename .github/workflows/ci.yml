name: ci

# Lint + test the packaging scripts, the deploy workflow, and the Terraform IaC on
# every push/PR. The real .deb build + repo signing legs run here too (the Ubuntu
# runner has dpkg-deb/apt-ftparchive/gpg), so the packaging contract is exercised
# end-to-end against actual tooling — not just the pure-logic units.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    name: shellcheck + actionlint + terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x \
            packaging/lib/common.sh \
            packaging/config.sh \
            packaging/build-deb.sh \
            packaging/repo/generate-repo.sh \
            packaging/inject-site-version.sh \
            tests/*.sh

      - name: actionlint
        # Run the actionlint binary directly (the documented install method) rather
        # than a wrapper action — the wrapper crashed under the Node 24 runner with
        # ERR_PACKAGE_PATH_NOT_EXPORTED in @actions/tool-cache.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: terraform fmt + validate
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8
      - run: terraform fmt -check -recursive
        working-directory: infra
      - run: terraform init -backend=false
        working-directory: infra
      - run: terraform validate
        working-directory: infra

  test:
    name: packaging tests (deb build + signed repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: install debian packaging toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev gnupg apt-utils
      - name: run test suite
        run: bash tests/run.sh

  a11y:
    name: accessibility (axe WCAG 2.2 AA on the landing page)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - name: install a11y test deps
        working-directory: tests/a11y
        run: npm ci
      - name: install chromium (with system deps)
        working-directory: tests/a11y
        run: npx playwright install --with-deps chromium
      - name: axe — assert 0 WCAG 2.2 AA violations on site/index.html
        working-directory: tests/a11y
        run: npm test
