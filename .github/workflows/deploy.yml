name: deploy

# Build the DIG .deb packages from the upstream GitHub releases, assemble + GPG-sign
# the flat apt repo (suite `stable`, component `main`), sync it to the S3 bucket, and
# invalidate CloudFront. Mirrors dig.net / status.dig.net (OIDC role, s3 sync,
# CF invalidate) with two NO-OP GATES so it stays green before provisioning:
#
#   1. signing key — needs the secret APT_GPG_PRIVATE_KEY. Without it the repo is
#      built UNSIGNED and the S3 sync is skipped (an unsigned repo is useless to apt),
#      with a clear notice. (Tests still prove the signed path works.)
#   2. infra — needs repo vars APT_S3_BUCKET, APT_CLOUDFRONT_DISTRIBUTION_ID, and
#      CI_DEPLOY_ROLE_ARN. Without them the build is verified and the sync is skipped.
#
# So a push pre-provisioning builds + verifies and then no-ops cleanly (green).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize: never let two runs race on `s3 sync --delete` (a delete-sweep could drop
# freshly-synced metadata while a stale Release survives).
concurrency:
  group: apt-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC (assume the deploy role; no stored AWS keys)

env:
  AWS_REGION: us-east-1
  DIST: dist

jobs:
  deploy:
    name: build debs + sign repo + sync + invalidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: install packaging toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev gnupg apt-utils

      - name: import GPG signing key (if provided)
        id: gpg
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APT_GPG_PRIVATE_KEY:-}" ]; then
            echo "fpr=" >> "$GITHUB_OUTPUT"
            echo "::notice title=apt.dig.net deploy::No APT_GPG_PRIVATE_KEY secret — building UNSIGNED (S3 sync will be skipped). Add the secret to publish a signed repo."
            exit 0
          fi
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          printf '%s' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          fpr="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')"
          echo "fpr=$fpr" >> "$GITHUB_OUTPUT"
          echo "::notice title=apt.dig.net deploy::Imported signing key $fpr"

      - name: build debs + assemble signed repo
        env:
          GPG_FPR: ${{ steps.gpg.outputs.fpr }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          make repo DIST="$DIST" GPG_FPR="$GPG_FPR"
          echo "--- repo tree ---"
          find "$DIST" -maxdepth 4 -type f | sort

      - name: check publish gates
        id: gate
        env:
          FPR: ${{ steps.gpg.outputs.fpr }}
          BUCKET: ${{ vars.APT_S3_BUCKET }}
          DIST_ID: ${{ vars.APT_CLOUDFRONT_DISTRIBUTION_ID }}
          ROLE: ${{ vars.CI_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [ -z "${FPR:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=apt.dig.net deploy::Unsigned build (no signing key) — skipping S3 sync."
            exit 0
          fi
          if [ -n "${BUCKET:-}" ] && [ -n "${DIST_ID:-}" ] && [ -n "${ROLE:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=apt.dig.net deploy::Infra not provisioned — set repo vars APT_S3_BUCKET, APT_CLOUDFRONT_DISTRIBUTION_ID, CI_DEPLOY_ROLE_ARN. Skipping S3 sync (repo built + signed)."
          fi

      - name: configure aws (oidc)
        if: steps.gate.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: sync to S3 + invalidate CloudFront
        if: steps.gate.outputs.ready == 'true'
        env:
          S3_BUCKET: ${{ vars.APT_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.APT_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          # Sync the bulk of the repo (pool/*.deb is content-addressed → cache long),
          # but re-put the metadata + key with no-cache so `apt update` never reads a
          # Release that no longer matches the pool. CloudFront also disables caching
          # for dists/* and dig.gpg (see infra/main.tf), this is belt-and-braces.
          aws s3 sync "$DIST" "s3://${S3_BUCKET}" --delete \
            --exclude 'dists/*' --exclude 'dig.gpg'
          aws s3 sync "$DIST/dists" "s3://${S3_BUCKET}/dists" --delete \
            --cache-control 'no-cache, max-age=0'
          aws s3 cp "$DIST/dig.gpg" "s3://${S3_BUCKET}/dig.gpg" \
            --cache-control 'no-cache, max-age=0'
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths '/*'
